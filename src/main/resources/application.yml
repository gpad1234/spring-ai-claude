spring:
  application:
    name: spring-ai-agent

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-20250514
          max-tokens: 4096
          temperature: 0.7

    # Groq — free-tier cloud inference for open-source models (https://console.groq.com)
    # Get a free API key at https://console.groq.com and set GROQ_API_KEY
    openai:
      api-key: ${GROQ_API_KEY:}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.7

    # Ollama — local open-source models (https://ollama.ai)
    # Start Ollama, then: ollama pull llama3.2
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: llama3.2
          num-predict: 4096

  # Agentic configuration
agent:
  max-iterations: 10
  system-prompt: |
    You are an intelligent AI agent with access to various skills (tools).
    When given a task, break it down into steps and use your available tools to accomplish it.
    Always explain your reasoning before and after using a tool.
    If a task cannot be completed with the available tools, explain what is missing.

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.ai: DEBUG
